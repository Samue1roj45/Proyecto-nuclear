spring.application.name=simulador-psicosocial
server.port=8080

spring.datasource.url=jdbc:h2:mem:psicosocial;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=MisionPsicosocialSimuladorAcademicoSecretKey2024SuperSecure
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=http://localhost:4200

app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# ── Correo SMTP (códigos de recuperación reales) ──
# Gmail: usa una contraseña de aplicación (https://myaccount.google.com/apppasswords)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

app.mail.from=${MAIL_FROM:}
app.mail.from-name=Misión Psicosocial

# ── OAuth (Google / Facebook) ──
app.oauth.google-client-id=${GOOGLE_CLIENT_ID:}
app.oauth.google-client-secret=${GOOGLE_CLIENT_SECRET:}
app.oauth.facebook-app-id=${FACEBOOK_APP_ID:}
app.oauth.facebook-app-secret=${FACEBOOK_APP_SECRET:}
