<div class="max-w-3xl mx-auto p-8 space-y-6">
  <div>
    <h2 class="text-3xl font-manrope font-semibold text-on-surface">Centro de ayuda</h2>
    <p class="text-on-surface-variant mt-1">Guía para estudiantes y profesores del simulador académico.</p>
  </div>

  <div *ngIf="loading" class="text-center text-on-surface-variant py-12">Cargando...</div>

  <div *ngFor="let section of sections" class="neon-panel rounded-xl overflow-hidden">
    <button type="button" (click)="toggle(section.id)"
            class="w-full flex items-center gap-3 p-5 text-left hover:bg-white/5 transition-colors"
            [attr.aria-expanded]="expanded[section.id]">
      <span class="material-symbols-outlined text-primary">{{ section.icon }}</span>
      <span class="font-manrope font-semibold flex-1">{{ section.title }}</span>
      <span class="material-symbols-outlined">{{ expanded[section.id] ? 'expand_less' : 'expand_more' }}</span>
    </button>
    <div *ngIf="expanded[section.id]" class="px-5 pb-5 space-y-4 border-t border-outline-variant/30">
      <div *ngFor="let item of section.items" class="pt-4">
        <h4 class="font-medium text-on-surface mb-1">{{ item.question }}</h4>
        <p class="text-sm text-on-surface-variant leading-relaxed">{{ item.answer }}</p>
      </div>
    </div>
  </div>
</div>
